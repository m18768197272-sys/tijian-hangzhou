<script src="js/data.js"></script>
<script>
function showSection(name){
  ["before","during","after"].forEach(function(s){
    document.getElementById("tips-"+s).classList.add("hidden");
  });
  document.getElementById("tips-"+name).classList.remove("hidden");
  document.querySelectorAll(".tip-tab").forEach(function(el,i){
    var secs=["before","during","after"];
    var active=secs[i]===name;
    el.className="tip-tab px-4 py-3 rounded-xl text-sm font-medium "+(active?"bg-amber-500 text-white text-center":"bg-slate-100 text-slate-600 text-center");
  });
}
function toggleFaq(el){el.classList.toggle("faq-open");}
function renderTips(){
  var catMap={before:TIPS.before,during:TIPS.during,after:TIPS.after};
  var catInfo={before:{icon:"🕐",color:"amber",name:"检前注意"},during:{icon:"🏥",color:"blue",name:"检中注意"},after:{icon:"📋",color:"green",name:"检后注意"}};
  ["before","during","after"].forEach(function(cat){
    var tips=catMap[cat];
    var info=catInfo[cat];
    var items=tips.map(function(t,i){
      return '<div class="faq-item" onclick="toggleFaq(this)">'+
        '<div class="flex items-center justify-between p-5 cursor-pointer hover:bg-slate-50">'+
          '<div class="flex items-center gap-3 flex-1">'+
            '<span class="text-'+info.color+'-500 font-bold text-sm">'+String(i+1).padStart(2,"0")+'<\/span>'+
            '<span class="font-medium text-slate-800 text-sm">'+t.q+'<\/span>'+
          '<\/div>'+
          '<svg class="faq-icon w-4 h-4 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"\/><\/svg>'+
        '<\/div>'+
        '<div class="faq-answer px-5 pb-5 pl-11 text-sm text-slate-600 leading-relaxed">'+t.a+'<\/div>'+
      '<\/div>';
    }).join("");
    document.getElementById("tips-"+cat).innerHTML='<div class="bg-white rounded-2xl border border-slate-100 divide-y divide-slate-100"><div class="p-5"><h2 class="font-bold text-lg text-slate-800 flex items-center gap-2">'+info.icon+' '+info.name+'<\/h2><\/div>'+items+'<\/div>';
  });
  var faqData=[
    {q:"体检需要预约吗？",a:"建议提前预约，尤其是三甲医院体检中心。公立医院体检中心周一至周五服务，周六部分开诊；民营机构通常周一至周日营业。预约可避免长时间等候。"},
    {q:"体检可以用医保吗？",a:"常规体检一般不能使用医保卡（医保仅覆盖疾病诊疗），但部分项目可能支持医保个人账户支付。高端套餐和民营机构通常需自费。"},
    {q:"体检当天需要带什么？",a:"请携带身份证原件。有既往病史或正在服药的，建议携带病历本和药物清单。女士如预约了妇科检查，请携带有效身份证件。"},
    {q:"女性月经期可以体检吗？",a:"建议避开月经期进行体检。尿常规、妇科检查等项目在经期检查会影响结果准确性。建议预约月经结束后3-7天。"},
    {q:"体检完成后多久可以进食？",a:"完成空腹项目（抽血、腹部B超、碳呼气试验等）后即可进食。建议自备早餐，或在体检机构用餐。部分机构提供免费早餐。"}
  ];
  document.getElementById("faqList").innerHTML=faqData.map(function(f,i){
    return '<div class="faq-item bg-white rounded-xl border border-slate-100" onclick="toggleFaq(this)">'+
      '<div class="flex items-center justify-between p-5 cursor-pointer hover:bg-slate-50">'+
        '<div class="flex items-center gap-3 flex-1">'+
          '<span class="bg-amber-100 text-amber-700 text-xs font-bold px-2 py-0.5 rounded">Q'+(i+1)+'<\/span>'+
          '<span class="font-medium text-slate-800 text-sm">'+f.q+'<\/span>'+
        '<\/div>'+
        '<svg class="faq-icon w-4 h-4 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"\/><\/svg>'+
      '<\/div>'+
      '<div class="faq-answer px-5 pb-5 pl-14 text-sm text-slate-600 leading-relaxed">'+f.a+'<\/div>'+
    '<\/div>';
  }).join("");
}
document.addEventListener("DOMContentLoaded",renderTips);
</script>
