    <button onclick="filterPkg(\'basic\')" class="pkg-filter px-4 py-1.5 rounded-full text-sm bg-slate-100 text-slate-600" data-filter="basic">基础套餐</button>
    <button onclick="filterPkg(\'deep\')" class="pkg-filter px-4 py-1.5 rounded-full text-sm bg-slate-100 text-slate-600" data-filter="deep">深度套餐</button>

<script src="js/data.js"></script>
<script>
function renderPkgs(filter) {
  var grid = document.getElementById('pkgGrid');
  var all = [];
  HOSPITALS.forEach(function(h){ h.packages.forEach(function(p){ all.push(Object.assign({},p,{hospitalId:h.id,hospitalName:h.name,hospitalType:h.type,hospitalLevel:h.level})); }); });
  var pkgs = all;
  if(filter==='public') pkgs=all.filter(function(p){return p.hospitalType==='public';});
  else if(filter==='private') pkgs=all.filter(function(p){return p.hospitalType==='private';});
  else if(filter==='basic') pkgs=all.filter(function(p){return p.tags.indexOf('基础')>-1;});
  else if(filter==='deep') pkgs=all.filter(function(p){return p.tags.indexOf('深度')>-1||p.tags.indexOf('高端')>-1;});
  grid.innerHTML=pkgs.map(function(p){
    var typeColor=p.hospitalType==='public'?'teal':'blue';
    var tags=p.tags.map(function(t){return '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs bg-'+typeColor+'-50 text-'+typeColor+'-700 mr-1">'+t+'</span>';}).join('');
    var disc=Math.round((1-p.price/p.originalPrice)*100);
    return '<div class="bg-white rounded-xl border border-slate-100 overflow-hidden card-hover">'+
      '<div class="p-4">'+
        '<div class="flex items-start justify-between gap-2 mb-2">'+
          '<h3 class="font-semibold text-slate-800 text-sm leading-tight flex-1">'+p.name+'</h3>'+
          '<span class="shrink-0 text-'+typeColor+'-600 font-bold">¥'+p.price+'</span>'+
        '</div>'+tags+
        '<div class="mt-2 flex items-center gap-2 text-xs text-slate-500">'+
          '<span class="bg-'+typeColor+'-50 text-'+typeColor+'-700 px-1.5 py-0.5 rounded">'+(p.hospitalType==='public'?'🏥':'🏢')+p.hospitalName.substring(0,10)+'</span>'+
        '</div>'+
        '<p class="text-xs text-slate-500 mt-1">适合：'+p.suitable+'</p>'+
        '<p class="text-xs text-slate-500">含 '+p.items.length+' 项检查</p>'+
        '<div class="flex items-center justify-between mt-3">'+
          '<span class="text-xs text-slate-400 line-through">¥'+p.originalPrice+'</span>'+
          '<span class="text-xs text-green-600 font-medium">省'+disc+'%</span>'+
          '<button onclick="addToCompare(\''+p.id+'\')" class="text-xs bg-'+typeColor+'-50 text-'+typeColor+'-700 px-3 py-1.5 rounded-lg hover:bg-'+typeColor+'-100">+ 对比</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}
function filterPkg(f) {
  document.querySelectorAll('.pkg-filter').forEach(function(btn){
    btn.className='pkg-filter px-4 py-1.5 rounded-full text-sm '+(btn.dataset.filter===f?'bg-teal-600 text-white':'bg-slate-100 text-slate-600');
  });
  renderPkgs(f);
}
function addToCompare(pkgId) {
  var compare=JSON.parse(sessionStorage.getItem('comparePkgs')||'[]');
  if(compare.includes(pkgId)){alert('已在对比列表中');return;}
  if(compare.length>=4){alert('最多对比4个套餐');return;}
  compare.push(pkgId);
  sessionStorage.setItem('comparePkgs',JSON.stringify(compare));
  alert('已加入对比，可在对比页面查看');
}
document.addEventListener('DOMContentLoaded',function(){renderPkgs('all');});
</script>
