<script src="js/data.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var grid = document.getElementById('hospitalGrid');
  HOSPITALS.filter(function(h){ return h.type==='private'; }).forEach(function(h) {
    var minPkg = h.packages ? Math.min.apply(null, h.packages.map(function(p){return p.price;})) : 0;
    var intro = h.intro.length > 80 ? h.intro.substring(0,80)+'...' : h.intro;
    grid.innerHTML += '<div class="bg-white rounded-2xl border border-slate-100 overflow-hidden card-hover">'+
      '<div class="h-40 bg-gradient-to-br from-blue-50 to-slate-100 flex items-center justify-center text-5xl">🏢</div>'+
      '<div class="p-5">'+
        '<div class="flex items-start justify-between gap-2 mb-2">'+
          '<h3 class="font-semibold text-slate-800 leading-tight flex-1">'+h.name+'</h3>'+
          '<span class="shrink-0 bg-blue-100 text-blue-700 text-xs px-2 py-0.5 rounded-full font-medium">'+h.level+'</span>'+
        '</div>'+
        '<p class="text-slate-500 text-xs mb-2">📍 '+h.address+'</p>'+
        '<p class="text-slate-600 text-xs mb-3 line-clamp-2">'+intro+'</p>'+
        '<div class="flex items-center justify-between">'+
          '<div class="text-blue-600 font-bold text-sm">¥'+minPkg+'<span class="text-slate-400 font-normal text-xs">/人起</span></div>'+
          '<button onclick="showHospital(\''+h.id+'\')" class="text-xs text-blue-600 hover:text-blue-700 font-medium">查看套餐 →</button>'+
        '</div>'+
        '<div class="mt-3 border-t border-slate-100 pt-3">'+
          '<p class="text-xs text-slate-500 mb-1"><span class="font-medium text-slate-700">特色：</span>'+h.highlight+'</p>'+
          '<p class="text-xs text-slate-500"><span class="font-medium text-slate-700">电话：</span>'+h.tel+'</p>'+
        '</div>'+
      '</div>'+
    '</div>';
  });
});
function showHospital(id) {
  var h = HOSPITALS.find(function(x){ return x.id===id; });
  if(!h) return;
  var modal = document.createElement('div');
  modal.id='modal';
  modal.className='fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4';
  modal.onclick=function(e){ if(e.target===modal) modal.remove(); };
  var pkgHtml = h.packages.map(function(p){
    var tags = p.tags.map(function(t){ return '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs bg-blue-50 text-blue-700 mr-1">'+t+'</span>'; }).join('');
    var itemsHtml = p.items.map(function(i){ return '<span class="text-slate-600">• '+i+'</span>'; }).join('');
    return '<div class="bg-slate-50 rounded-xl p-4 mb-3">'+
      '<div class="flex items-start justify-between mb-2">'+
        '<div><h4 class="font-medium text-slate-800">'+p.name+'</h4>'+tags+'</div>'+
        '<div class="text-right shrink-0 ml-2"><div class="text-blue-600 font-bold text-lg">¥'+p.price+'</div><div class="text-slate-400 text-xs line-through">¥'+p.originalPrice+'</div></div>'+
      '</div>'+
      '<p class="text-xs text-slate-500 mb-2">适合：'+p.suitable+' | 出报告：'+p.period+'</p>'+
      '<details class="text-xs"><summary class="cursor-pointer text-blue-600 font-medium mb-1">查看包含项目（'+p.items.length+'项）</summary>'+
        '<div class="grid grid-cols-2 gap-1 mt-2">'+itemsHtml+'</div>'+
      '</details>'+
      '<button onclick="addToCompare(\''+p.id+'\')" class="mt-2 text-xs bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-100 transition-colors">+ 加入对比</button>'+
    '</div>';
  }).join('');
  modal.innerHTML='<div class="bg-white rounded-2xl max-w-lg w-full max-h-[85vh] overflow-y-auto">'+
    '<div class="sticky top-0 bg-white border-b border-slate-100 p-5 flex items-start justify-between">'+
      '<div><h3 class="font-bold text-lg text-slate-800">'+h.name+'</h3><span class="text-xs text-slate-500">'+h.level+' | '+h.address+'</span></div>'+
      '<button onclick="this.closest(\'#modal\').remove()" class="text-slate-400 hover:text-slate-600 text-xl">×</button>'+
    '</div>'+
    '<div class="p-5">'+
      '<p class="text-sm text-slate-600 mb-4">'+h.intro+'</p>'+
      '<p class="text-xs text-slate-500 mb-4">⏰ '+h.hours+' | 📞 '+h.tel+'</p>'+
      '<h4 class="font-semibold text-slate-800 mb-3">可选套餐</h4>'+pkgHtml+
    '</div>'+
  '</div>';
  document.body.appendChild(modal);
}
function addToCompare(pkgId) {
  var compare = JSON.parse(sessionStorage.getItem('comparePkgs') || '[]');
  if(compare.includes(pkgId)){ alert('已在对比列表中'); return; }
  if(compare.length>=4){ alert('最多对比4个套餐'); return; }
  compare.push(pkgId);
  sessionStorage.setItem('comparePkgs', JSON.stringify(compare));
  alert('已加入对比，可在对比页面查看');
}
</script>
